<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Performance Prediction | End-to-End ML Project</title>
<link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(135deg,#4facfe,#00f2fe);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

}

.login{

width:100%;

max-width:900px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

padding:40px;

border-radius:20px;

box-shadow:0 20px 45px rgba(0,0,0,.25);

border:1px solid rgba(255,255,255,.3);

}

h1{

text-align:center;

color:white;

margin-bottom:30px;

font-size:34px;

}

legend{

text-align:center;

font-size:24px;

font-weight:bold;

margin-bottom:30px;

color:white;

}

form{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.mb-3{

display:flex;

flex-direction:column;

}

label{

margin-bottom:8px;

font-weight:600;

color:white;

}

.form-control{

padding:13px;

border:none;

border-radius:10px;

font-size:15px;

outline:none;

transition:.3s;

}

.form-control:focus{

transform:scale(1.02);

box-shadow:0 0 15px rgba(255,255,255,.5);

}

.btn{

grid-column:span 2;

padding:15px;

font-size:18px;

font-weight:bold;

border:none;

border-radius:12px;

background:white;

color:#0077ff;

cursor:pointer;

transition:.3s;

}

.btn:hover{

background:#0077ff;

color:white;

transform:translateY(-3px);

}

.result{

margin-top:30px;

background:white;

padding:18px;

border-radius:12px;

text-align:center;

font-size:24px;

font-weight:bold;

color:#0077ff;

}

@media(max-width:768px){

form{

grid-template-columns:1fr;

}

.btn{

grid-column:span 1;

}

.login{

padding:25px;

}

h1{

font-size:28px;

}

}

</style>

</head>
<body>
    <div class="login">
       <h1>Student Performance Prediction</h1>
   
       <form action="{{ url_for('home')}}" method="post">
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" placeholder="Enter you Gender" required>
                <option class="placeholder" selected disabled value="">Select your Gender</option>
                <option value="male">
                    Male
                </option>
                <option value="female">
                    Female
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Race or Ethnicity</label>
            <select class="form-control" name="ethnicity" placeholder="Enter you ethnicity" required>
                <option class="placeholder" selected disabled value="">Select Ethnicity</option>
                <option value="group A">
                    Group A
                </option>
                <option value="group B">
                    Group B
                </option>
                <option value="group C">
                    Group C
                </option>
                <option value="group D">
                    Group D
                </option>
                <option value="group E">
                    Group E
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Parental Level of Education</label>
            <select class="form-control" name="parental_level_of_education"
                placeholder="Enter you Parent Education" required>
                <option class="placeholder" selected disabled value="">Select Parent Education</option>
                <option value="associate's degree">
                    associate's degree
                </option>
                <option value="bachelor's degree">
                    bachelor's degree
                </option>
                <option value="high school">
                    high school
                </option>
                <option value="master's degree">
                    master's degree
                </option>
                <option value="some college">
                    some college
                </option>
                <option value="some high school">
                    some high school
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Lunch Type</label>
            <select class="form-control" name="lunch" placeholder="Enter you Lunch" required>
                <option class="placeholder" selected disabled value="">Select Lunch Type</option>
                <option value="free/reduced">
                    free/reduced
                </option>
                <option value="standard">
                    standard
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Test preparation Course</label>
            <select class="form-control" name="test_preparation_course" placeholder="Enter you Course"
                required>
                <option class="placeholder" selected disabled value="">Select Test_course</option>
                <option value="none">
                    None
                </option>
                <option value="completed">
                    Completed
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Writing Score out of 100</label>
            <input class="form-control" type="number" name="reading_score"
                placeholder="Enter your Reading score" min='0' max='100' />
        </div>
        <div class="mb-3">
            <label class="form-label">Reading Score out of 100</label>
            <input class="form-control" type="number" name="writing_score"
                placeholder="Enter your Reading Score" min='0' max='100' />
        </div>
        <div class="mb-3">
            <input class="btn btn-primary" type="submit" value="Predict Student Performance" required />
        </div>
    </form>
    <div class="result">

🎯 Predicted Maths Score

<br><br>

{{ results }}

</div>
   <body>
</html>
